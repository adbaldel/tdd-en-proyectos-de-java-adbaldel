name: Run Tests and Update Early Branch

on:
  push:
    branches:
      - main # Solo nos interesa ejecutar esto cuando haya cambios en main

# Permisos necesarios para poder hacer push a otra rama
permissions:
  contents: write

jobs:
  test-and-sync:
    runs-on: ubuntu-latest
    steps:
      # 1. Traer el código de la rama main
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          # Necesitamos todo el historial para poder hacer el push a 'early' correctamente
          fetch-depth: 0 

      # 2. Configurar el entorno de Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Ejecutar los tests
      # 'mvn test' ejecutará todos los tests de tu proyecto.
      # Si algún test falla, este paso fallará y el workflow se detendrá aquí.
      - name: Run Maven Tests
        run: mvn -B test --file pom.xml

      # 4. Actualizar la rama early (Solo se ejecutará si el paso 3 fue exitoso)
      - name: Push to early branch
        # Si llegamos aquí, los tests pasaron.
        # Usamos git para forzar la actualización de la rama early local
        # al commit actual de main, y luego hacemos un push forzado al repositorio remoto.
        run: |
          git checkout -B early
          git push -f origin early
